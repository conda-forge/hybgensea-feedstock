{% set name = "hybgensea" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hybgensea-{{ version }}.tar.gz
  sha256: 6cd07ef3f8eccbbcf7b0dad5385622d448a33c27377da308f2b1a338951b048a

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - make
  host:
    - python
    - scikit-build-core
    - nanobind
    - pip
  run:
    - python
    - numpy

test:
  imports:
    - hybgensea
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/mdealencar/PyHygese
  summary: Wrapper for the Hybrid Genetic Search algorithm for Capacitated Vehicle Routing Problems (HGS-CVRP)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mdealencar
    - simutisernestas
